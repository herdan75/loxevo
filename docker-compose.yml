services:
  loxevo:
    build: .
    image: loxevo:local
    container_name: loxevo
    restart: unless-stopped
    network_mode: host
    environment:
      CONFIG_PATH: /config/config.json
      LOXEVO_ADMIN_TOKEN: ${LOXEVO_ADMIN_TOKEN:-}
      TZ: Europe/Zurich
    volumes:
      - ./data:/config
